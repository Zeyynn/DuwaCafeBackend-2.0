extend type Mutation {
    addToCart(input: AddToCartInput): SuccessResponse!
    @field(resolver: "Modules\\Cart\\GraphQL\\Mutations\\CartMutator@addToCart")
    removeFromCart(input: RemoveFromCartInput): SuccessResponse!
    @field(resolver: "Modules\\Cart\\GraphQL\\Mutations\\CartMutator@removeFromCart")
    updateCartItem(input: UpdateCartItemInput): SuccessResponse!
    @field(resolver: "Modules\\Cart\\GraphQL\\Mutations\\CartMutator@updateCartItem")
}

input AddToCartInput {
    menuItemId: Int!
    quantity: Int!
}

input UpdateCartItemInput {
    menuItemId: ID!
    quantity: Int!
}

input RemoveFromCartInput {
    menuItemId: ID!
}
