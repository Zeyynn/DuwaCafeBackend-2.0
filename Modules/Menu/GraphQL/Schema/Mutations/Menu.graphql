extend type Mutation {
    createMenu(input: CreateMenuInput @spread): SuccessResponse!
    @field(resolver: "Modules\\Menu\\GraphQL\\Mutations\\MenuMutator@create")
    updateMenu(menu_id: ID!, input: UpdateMenuInput @spread): SuccessResponse!
    @field(resolver: "Modules\\Menu\\GraphQL\\Mutations\\MenuMutator@update")
    deleteMenu(menu_id: ID!): SuccessResponse!
    @field(resolver: "Modules\\Menu\\GraphQL\\Mutations\\MenuMutator@delete")
}

input CreateMenuInput {
    menu_name: String!
    menu_slug: String!
    menu_type: MenuType!
    menu_description: String
    menu_price_cents: Float!
    menu_status: MenuStatus
    menu_image: String
}

input UpdateMenuInput {
    menu_name: String
    menu_slug: String
    menu_description: String
    menu_price_cents: Float
    menu_image: String
}

enum MenuType {
    ALLDAY
    TOAST
    BITES
    PIZZA
    PASTA
    ETCETERA
    SOUP
    ESPRESSO
    FRAPPE
    NONCOFFEE
}

enum MenuStatus {
    ACTIVE
    INACTIVE
}